<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBQ Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Defining your primary color for Tailwind
      tailwind.config = {
        theme: { extend: { colors: { primary: "#ef4444" } } },
      };
    </script>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen p-4 sm:p-8">
    <header
      class="flex justify-between items-center mb-8 border-b border-white/10 pb-6"
    >
      <div>
        <h1 class="text-4xl font-black text-[#ef4444] tracking-tighter">
          ORDER MANAGEMENT
        </h1>
        <p
          id="admin-email-display"
          class="text-zinc-500 font-bold uppercase tracking-widest text-xs mt-1"
        >
          Live Kitchen Feed
        </p>
      </div>
      <div class="flex items-center gap-4">
        <button
          id="logout-btn"
          class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-lg text-xs font-black uppercase transition-all"
        >
          Sign Out
        </button>

        <div
          id="status-indicator"
          class="flex items-center gap-2 px-4 py-2 bg-green-500/10 text-green-500 rounded-full border border-green-500/20"
        >
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          <span class="text-xs font-black">LIVE</span>
        </div>
      </div>
    </header>
    <div
      id="login-overlay"
      class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50 transition-opacity duration-500"
    >
      <div
        class="bg-zinc-900 p-8 rounded-3xl border border-white/10 w-full max-w-md shadow-2xl"
      >
        <h2
          class="text-3xl font-black text-primary mb-2 tracking-tighter text-center"
        >
          ADMIN ACCESS
        </h2>
        <p
          class="text-zinc-500 text-center mb-8 font-bold uppercase text-xs tracking-widest"
        >
          BBQ Heaven Rockingham
        </p>

        <form id="login-form" class="space-y-4">
          <input
            type="email"
            id="admin-email"
            placeholder="Email"
            required
            class="w-full p-4 bg-zinc-800 rounded-xl border border-white/5 text-white focus:border-primary outline-none"
          />
          <input
            type="password"
            id="admin-password"
            placeholder="Password"
            required
            class="w-full p-4 bg-zinc-800 rounded-xl border border-white/5 text-white focus:border-primary outline-none"
          />
          <button
            type="submit"
            class="w-full py-4 bg-primary text-white font-black rounded-xl hover:bg-red-500 transition-colors"
          >
            LOGIN TO DASHBOARD
          </button>
        </form>
      </div>
    </div>

    <div
      id="admin-list"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
    >
      <div class="text-zinc-600 italic">Waiting for orders...</div>
    </div>

    <script type="module" src="./dashboard/admin-logic.js"></script>
  </body>
</html>
