<section
  id="menu"
  class="px-6 py-20 bg-black/20 backdrop-blur-sm text-white relative z-10"
>
  <div class="max-w-6xl mx-auto">
    <div class="mb-12 text-center">
      <h2
        class="mb-2 text-4xl font-display md:text-5xl uppercase tracking-tight"
      >
        The Smokehouse Menu
      </h2>
      <p class="text-primary font-bold uppercase tracking-widest text-sm">
        Authentic Low & Slow Meats
      </p>
    </div>

    <div class="flex flex-col items-center mb-16 gap-8">
      <div id="category-filters" class="flex flex-wrap justify-center gap-3">
        <button
          onclick="setCategory('all')"
          class="cat-btn active-cat px-6 py-2 border border-primary text-primary font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:bg-primary hover:text-white"
        >
          All
        </button>
        <button
          onclick="setCategory('starters')"
          class="cat-btn px-6 py-2 border border-white/10 text-gray-400 font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:border-primary hover:text-primary"
        >
          Starters
        </button>
        <button
          onclick="setCategory('mains')"
          class="cat-btn px-6 py-2 border border-white/10 text-gray-400 font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:border-primary hover:text-primary"
        >
          Mains
        </button>
        <button
          onclick="setCategory('burgers_and_sandwiches')"
          class="cat-btn px-6 py-2 border border-white/10 text-gray-400 font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:border-primary hover:text-primary"
        >
          Burgers
        </button>
        <button
          onclick="setCategory('heaven_boards_family_to_share')"
          class="cat-btn px-6 py-2 border border-white/10 text-gray-400 font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:border-primary hover:text-primary"
        >
          Platters
        </button>
        <button
          onclick="setCategory('drinks')"
          class="cat-btn px-6 py-2 border border-white/10 text-gray-400 font-bold uppercase text-xs tracking-widest rounded-full transition-all hover:border-primary hover:text-primary"
        >
          Drinks
        </button>
        <div class="flex items-center gap-2 ml-4 px-4 border-l border-white/20">
          <label
            class="relative inline-flex items-center cursor-pointer"
            title="Gluten Free Only"
          >
            <input
              type="checkbox"
              id="gfToggle"
              onchange="filterMenu()"
              class="sr-only peer"
            />
            <div
              class="w-11 h-6 bg-smoke peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600 peer-checked:after:bg-white"
            ></div>
            <span
              class="ml-3 text-xs font-bold uppercase tracking-widest text-gray-400 peer-checked:text-green-500"
              >GF Only</span
            >
          </label>
        </div>
      </div>

      <div class="w-full max-w-md relative">
        <input
          type="text"
          id="menuSearch"
          onkeyup="filterMenu()"
          placeholder="Search menu..."
          class="w-full py-4 pl-10 pr-4 text-white rounded-lg bg-smoke border border-white/10 focus:border-primary outline-none"
        />
      </div>
    </div>

    <div
      id="menuGrid"
      class="grid grid-cols-1 gap-8 md:grid-cols-2 lg:grid-cols-3"
    ></div>

    <div id="noResults" class="hidden text-center py-20 text-gray-500">
      <p>No items found matching your search.</p>
    </div>
  </div>
</section>

<style>
  .bg-charcoal {
    background-color: #1a1a1a;
  }
  .bg-smoke {
    background-color: #262626;
  }
  .text-primary {
    color: #d97706;
  }
  .border-primary {
    border-color: #d97706;
  }
  .active-cat {
    background-color: #d97706 !important;
    color: white !important;
    border-color: #d97706 !important;
  }
</style>
