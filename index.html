<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BBQ Heaven Rockingham | Authentic Woodfire BBQ & Ribs</title>
    <meta
      name="description"
      content="Rockingham's home for slow-cooked beef brisket, sticky bourbon ribs, and woodfire BBQ. Visit us at 6/33-39 Pinjarra Rd."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="/hero.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/tailwindcss" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#d97706",
              smoke: "#1a1a1a",
            },
            fontFamily: {
              display: ["Oswald", "sans-serif"],
            },
          },
        },
      };
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "BBQ Heaven Rockingham",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "6/33-39 Pinjarra Rd",
          "addressLocality": "Rockingham",
          "addressRegion": "WA",
          "postalCode": "6210",
          "addressCountry": "AU"
        },
        "telephone": "+61895676048",
        "servesCuisine": "BBQ",
        "priceRange": "$$"
      }
    </script>
  </head>
  <!-- <body class="bg-[#121212] text-white font-sans antialiased"> -->
  <body class="bg-black">
    <button
      id="backToTop"
      onclick="scrollToTop()"
      class="fixed bottom-8 right-8 z-50 p-4 rounded-full bg-primary text-white shadow-2xl opacity-0 translate-y-10 transition-all duration-300 hover:scale-110 hover:bg-primary-dark cursor-pointer flex items-center justify-center border border-white/20"
      aria-label="Back to top"
    >
      <i class="fa-solid fa-arrow-up text-xl"></i>
    </button>
    <div class="fire-bg-animate"></div>
    <div class="relative z-10 bg-black/40 min-height-screen">
      <div id="header-placeholder"></div>

      <main>
        <section id="hero" class="hero">
          <!-- <div class="hero-slides">
            <div
              class="slide"
              style="background-image: url(&quot;./images/image1.jpg&quot;)"
              data-effect="zoom"
            ></div>
            <div
              class="slide"
              style="background-image: url(&quot;./images/image2.jpg&quot;)"
              data-effect="fly-left"
            ></div>
            <div
              class="slide"
              style="background-image: url(&quot;./images/image3.jpg&quot;)"
              data-effect="zoom"
            ></div>
            <div
              class="slide"
              style="background-image: url(&quot;./images/image4.jpg&quot;)"
              data-effect="fly-right"
            ></div>
          </div> -->
          <div class="hero-overlay">
            <div id="hero-placeholder"></div>
          </div>
        </section>

        <div id="menu-placeholder"></div>
        <div id="location-placeholder"></div>
      </main>

      <div id="footer-placeholder"></div>
    </div>

    <div
      id="menuModal"
      class="hidden fixed inset-0 z-[150] flex items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-black/90 backdrop-blur-sm"
        onclick="closeMenuModal()"
      ></div>
      <div
        class="relative bg-smoke border border-white/10 w-full max-w-2xl rounded-xl overflow-hidden shadow-2xl"
      >
        <button
          onclick="closeMenuModal()"
          class="absolute top-4 right-4 z-20 text-white/50 hover:text-white text-2xl"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="flex flex-col">
          <div class="aspect-video bg-black overflow-hidden">
            <img
              id="modalImage"
              src=""
              alt=""
              class="w-full h-full object-cover"
            />
          </div>
          <div class="p-8">
            <div class="flex justify-between items-start mb-4">
              <h2
                id="modalTitle"
                class="text-3xl font-display uppercase tracking-tight text-white"
              ></h2>
              <span
                id="modalPrice"
                class="text-xl font-bold text-primary"
              ></span>
            </div>
            <p
              id="modalDescription"
              class="text-gray-400 mb-8 leading-relaxed"
            ></p>

            <button
              id="modalAddBtn"
              class="w-full py-4 bg-primary text-white font-bold uppercase tracking-widest rounded-lg hover:bg-amber-600 transition-colors flex items-center justify-center gap-2"
            >
              <i class="fa-solid fa-plus"></i> Add to Order List
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="orderModal"
      class="hidden fixed inset-0 z-[160] flex items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-black/90 backdrop-blur-sm"
        onclick="closeOrderModal()"
      ></div>
      <div
        class="relative bg-smoke border border-white/10 w-full max-w-lg rounded-xl overflow-hidden shadow-2xl flex flex-col max-h-[80vh]"
      >
        <div
          class="p-6 border-b border-white/10 flex justify-between items-center"
        >
          <h2 class="text-2xl font-display uppercase tracking-tight text-white">
            Your Order List
          </h2>
          <button
            onclick="closeOrderModal()"
            class="text-white/50 hover:text-white text-2xl"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div
          id="orderItemsContainer"
          class="p-6 overflow-y-auto flex-grow flex flex-col gap-4"
        ></div>

        <div class="p-6 border-t border-white/10 bg-black/20">
          <div class="space-y-2 mb-6">
            <div class="flex justify-between text-gray-400 text-sm">
              <span>Subtotal</span>
              <span id="order-subtotal">$0.00</span>
            </div>
            <div class="flex justify-between text-gray-400 text-sm">
              <span>GST (10%)</span>
              <span id="order-tax">$0.00</span>
            </div>
            <div
              class="flex justify-between text-white font-bold text-xl pt-2 border-t border-white/5"
            >
              <span>Total</span>
              <span id="order-total">$0.00</span>
            </div>
          </div>

          <button
            class="w-full py-4 bg-primary text-white font-bold uppercase tracking-widest rounded-lg hover:bg-amber-600 transition-colors"
          >
            Place Order Now
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./main.js"></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"
      defer
    ></script>
    <!-- <script src="/hero.js"></script> -->
    <script
      src="https://www.fbgcdn.com/embedder/js/ewm2.js"
      defer
      async
    ></script>
  </body>
</html>
